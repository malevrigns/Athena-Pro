[project]
name = "athena"
version = "1.0.0"
description = "Enterprise-grade research intelligence platform built on LangGraph"
requires-python = ">=3.11"
readme = "README.md"
authors = [{ name = "Your Name", email = "you@example.com" }]
license = { text = "Apache-2.0" }

dependencies = [
    # 核心
    "langgraph >= 1.1.0",
    "langchain >= 1.2.0",
    "langchain-openai >= 1.1.0",
    "langchain-anthropic >= 1.0.0",          # fallback 模型
    
    # 持久化
    "langgraph-checkpoint-postgres >= 3.0.0",
    "psycopg[binary,pool] >= 3.2.0",          # 注意是 psycopg 不是 psycopg2
    "redis >= 5.0.0",                          # 工具缓存
    
    # API
    "fastapi >= 0.115.0",
    "uvicorn[standard] >= 0.32.0",
    "sse-starlette >= 2.1.0",                  # SSE 实现
    
    # 工具
    "tavily-python >= 0.5.0",                  # 真实搜索
    "httpx >= 0.27.0",                          # 异步 HTTP
    "beautifulsoup4 >= 4.12.0",                # 网页解析
    
    # 配置 & 数据
    "pydantic >= 2.9.0",
    "pydantic-settings >= 2.6.0",
    
    # 可观测性
    "langsmith >= 0.2.0",
    "opentelemetry-api >= 1.27.0",
    "opentelemetry-sdk >= 1.27.0",
    "opentelemetry-instrumentation-fastapi >= 0.48b0",
    "structlog >= 24.4.0",
    "prometheus-client >= 0.21.0",
    
    # 工具集
    "tenacity >= 9.0.0",                       # 重试库
    "tiktoken >= 0.8.0",                       # token 统计
]

[dependency-groups]
dev = [
    "pytest >= 8.3.0",
    "pytest-asyncio >= 0.24.0",
    "pytest-cov >= 6.0.0",
    "respx >= 0.21.0",                         # HTTP mock
    "ruff >= 0.7.0",
    "mypy >= 1.13.0",
    "ipython",
]

eval = [
    "langsmith[evals] >= 0.2.0",
]

load = [
    "locust >= 2.32.0",                        # 压测
]

[project.scripts]
athena = "athena.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "SIM", "ASYNC"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-v --cov=athena --cov-report=term-missing"