version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: athena
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena"]
      interval: 5s
      retries: 5
  
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      OPENAI_API_KEY:        ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY:        ${TAVILY_API_KEY}
      LANGSMITH_API_KEY:     ${LANGSMITH_API_KEY}
      DATABASE_URL:          postgresql+asyncpg://athena:${POSTGRES_PASSWORD:-changeme}@postgres:5432/athena
      REDIS_URL:             redis://redis:6379/0
      ATHENA_ENV:            production
      MONTHLY_BUDGET_USD:    "50"
    ports: ["8000:8000"]
    # Sandbox 需要访问 Docker socket(ch31)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
  
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on: [backend]
    environment:
      ATHENA_BACKEND_URL:       http://backend:8000
      ATHENA_INTERNAL_TOKEN:    ${INTERNAL_TOKEN}
      NEXT_PUBLIC_WS_URL:       ws://localhost:8000/v1/ws
    ports: ["3000:3000"]
    restart: unless-stopped
  
  # 可观测性(ch26 已讲)
  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
  
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports: ["3001:3000"]

volumes:
  postgres-data:
  grafana-data: